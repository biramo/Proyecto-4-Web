<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llar Online - Contacto</title>
    <link rel="icon" href="img/logos/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/estil.css">
    <script src="js/menu_active.js" defer></script>
    <script src="js/scripts.js" defer></script>
    <script src="js/cookies.js"></script>
</head>

<body>

    <div id="header_box"></div>
    <div id="menu_box"></div>

    <main class="main">
        <section class="contact_page">

            <div class="contact_wrap">

                <div class="contact_img_box">
                    <img class="contact_img" src="img/contacto/contacto.png" alt="Interior de hogar sostenible">
                </div>

                <div class="contact_form_box">

                    <div class="tit_sec">
                        <h2 class="tit_sec_h2">¡Contáctanos!</h2>
                        <p class="tit_sec_txt">
                            Escríbenos si tienes dudas sobre nuestros productos, disponibilidad o tiempos de entrega.
                        </p>
                    </div>

                    <form class="contact_form">

                        <div class="contact_grupo">
                            <label class="contact_label" for="nombre">Nombre:</label>
                            <input class="contact_input" id="nombre" type="text" placeholder="Escribe tu nombre">
                        </div>

                        <div class="contact_grupo">
                            <label class="contact_label" for="telefono">Teléfono de contacto:</label>
                            <input class="contact_input" id="telefono" type="tel" placeholder="Escribe tu teléfono">
                        </div>

                        <div class="contact_grupo">
                            <label class="contact_label" for="email">Email:</label>
                            <input class="contact_input" id="email" type="email" placeholder="Escribe tu email">
                        </div>

                        <div class="contact_grupo">
                            <label class="contact_label" for="comentario">Comentario o sugerencia:</label>
                            <textarea class="contact_textarea" id="comentario" placeholder="Cuéntanos en qué podemos ayudarte"></textarea>
                        </div>

                        <button class="contact_btn" type="submit">
                            Enviar mensaje
                        </button>

                    </form>

                </div>

            </div>

        </section>
    </main>

    <div id="footer_box"></div>

</body>

</html>
