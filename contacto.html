<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llar Online - Blog</title>
    <link rel="stylesheet" href="css/estil.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>

    <div id="header_box"></div>
    <div id="menu_box"></div>
    <section>
        <div class="formulario_contacto">
            <div class="tit_sec_h2">
                <h2>
                    !Contáctanos¡
                </h2>
            
            </div>
            <div class="formulario">
            <form>
                <div class="formulario_nombre">
                   <label> Nombre:</label> 
                   <input type="text" placeholder="Josep Garcia" >
                </div>
                <div class="formulario_telefono">
                   <label> Telefono de contacto:</label> 
                   <input type="tel" placeholder="+34 000 000 000" pattern="[0-9]{9,15}">
                </div>
                 <div class="formulario_email">
                   <label> Email:</label> 
                   <input type="text" placeholder="josep@llaronline.com " >
                </div>
                <div class="formulario_comentario">
                   <label> Comentario o sugerencia:</label> 
                   <br><textarea placeholder="Escribe aquí tu mensaje..."></textarea>
                </div>
                <div class="formulario_submit">
                    <input type="submit" value="Enviar Consulta" />
                </div>
            </form>
            </div>
        </div>    

    </section>
    <div id="footer_box"></div>

</body>
</html>
