<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llar Online - Contacto</title>
    <link rel="icon" href="img/logos/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/estil.css">
    <script src="js/menu_active.js" defer></script>
    <script src="js/scripts.js" defer></script>
    <script src="js/cookies.js"></script>
</head>

<body>

    <div id="header_box"></div>
    <div id="menu_box"></div>
    <main class="main">
        <section class="contact_page">
            <div class="formulario_contacto">
                <div class="tit_sec_h2">
                    <h2 class="contacto_tit">
                        ¡Contáctanos!
                    </h2>
                </div>
                <div class="formulario">
                    <form>
                        <div class="formulario_nombre">
                            <label> Nombre:</label>
                            <input type="text" placeholder="Escribe tu nombre">
                        </div>
                        <div class="formulario_telefono">
                            <label> Telefono de contacto:</label>
                            <input type="number" placeholder="Telefono ">
                        </div>
                        <div class="formulario_email">
                            <label> Email:</label>
                            <input type="text" placeholder="Email ">
                        </div>
                        <div class="formulario_comentario">
                            <label> Comentario o sugerencia:</label>
                            <input type="text" placeholder="">
                        </div>
                    </form>
                </div>
            </div>

        </section>
    </main>
    <div id="footer_box"></div>

</body>

</html>
